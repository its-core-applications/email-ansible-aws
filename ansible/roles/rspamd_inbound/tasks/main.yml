- tags:
    - rspamd
  block:
    - ansible.builtin.import_role:
        name: rspamd

    - name: Configure rspamd actions
      ansible.builtin.copy:
        dest: /etc/rspamd/local.d/actions.conf
        src: actions.conf
        owner: root
        group: root
        mode: "0644"
      register: result

    - name: Restart rspamd
      ansible.builtin.systemd_service:
        name: rspamd
        state: restarted
      when: result is changed

    - name: Install rspamd filter
      ansible.builtin.copy:
        dest: /etc/mail/filters/79_rspamd
        src: 80_rspamd
        owner: root
        group: root
        mode: "0755"

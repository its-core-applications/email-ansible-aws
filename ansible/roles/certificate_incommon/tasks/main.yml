- tags:
    - certificate
    - incommon
  vars:
    cert_directory: /etc/pki/acme
    acme_key: "{{ lookup('flowerysong.hvault.kv', 'certificate/certinext', errors='ignore').rsa_key }}"
    cert_existing: "{{ lookup('flowerysong.hvault.kv', 'certificate/' ~ certificate, errors='ignore') }}"
    cert_subject_alt_names: "{{ [certificate] | union(certificate_sans | default([])) | map('regex_replace', '^', 'DNS:') }}"
  module_defaults:
    community.crypto.acme_certificate:
      # Need to have a default so that initial setup is possible;
      # module_defaults are evaluated even when they're not used...
      account_key_content: "{{ acme_key | default('placeholder') }}"
      acme_directory: https://acme-us.certinext.io/v1/directory
      terms_agreed: true
      # CertiNext is too slow for the default of 10 seconds
      request_timeout: 40
      modify_account: false
      acme_version: 2
      challenge: dns-01
      remaining_days: 30
  delegate_to: localhost
  run_once: true
  become: false
  block:
    - name: Create certificate storage directory
      ansible.builtin.file:
        dest: "{{ cert_directory }}"
        owner: "{{ lookup('env', 'USER') }}"
        mode: "0700"
        state: directory
      become: true

    - name: Create account key
      community.crypto.openssl_privatekey_pipe:
      register: result
      when: not (acme_key | default(false))
      no_log: true

    - name: Store account key
      flowerysong.hvault.kv:
        token: "{{ ansible_hvault_token }}"
        key: certificate/certinext
        value:
          rsa_key: "{{ result.privatekey }}"
      when: result is not skipped
      no_log: true

    - name: Register ACME account
      community.crypto.acme_account:
        state: present
        account_key_content: "{{ acme_key }}"
        acme_directory: https://acme-us.certinext.io/v1/directory
        terms_agreed: true
        acme_version: 2
        external_account_binding:
          alg: HS256
          key: "{{ lookup('flowerysong.hvault.kv', 'acme/certinext').key }}"
          kid: "{{ lookup('flowerysong.hvault.kv', 'acme/certinext').kid }}"
        contact:
          - mailto:letsencrypt@devnull.mail.umich.edu
      when: result is not skipped

    - name: Create keys for {{ certificate }}
      community.crypto.openssl_privatekey_pipe:
        type: "{{ item.type | upper }}"
        size: "{{ item.size | default(omit) }}"
        curve: "{{ item.curve | default(omit) }}"
      loop:
        - type: rsa
          size: 4096
        - type: ecc
          curve: secp256r1
      register: key_result
      no_log: true

    - name: Generate CSRs for {{ certificate }}
      community.crypto.openssl_csr_pipe:
        common_name: "{{ certificate }}"
        subject_alt_name: "{{ cert_subject_alt_names }}"
        privatekey_content: "{{ (key_result.results | selectattr('item.type', '==', item)).0.privatekey }}"
      loop:
        - rsa
        - ecc
      register: csr_result

    - name: Copy existing certificates for {{ certificate }}
      ansible.builtin.copy:
        dest: "{{ cert_directory }}/{{ certificate }}.{{ item }}.crt"
        content: "{{ cert_existing[item ~ '_cert'] | default('') }}"
        mode: "0755"
      when:
        - cert_existing[item ~ '_cert'] | default(false)
        - (cert_existing[item ~ '_cert'] | community.crypto.x509_certificate_info).subject_alt_name | ansible.builtin.symmetric_difference(cert_subject_alt_names) | length == 0
      loop:
        - rsa
        - ecc
      register: result

    - name: Delete stale certificates for {{ certificate }}
      ansible.builtin.file:
        dest: "{{ cert_directory }}/{{ certificate }}.{{ item }}.crt"
        state: absent
      loop: "{{ result.results | select('skipped') | map(attribute='item') }}"

    - name: Order certificates for {{ certificate }}
      community.crypto.acme_certificate:
        csr_content: "{{ item.csr }}"
        fullchain_dest: "{{ cert_directory }}/{{ certificate }}.{{ item.item }}.crt"
      loop: "{{ csr_result.results }}"
      register: acme_data

    - name: Get certificates for {{ certificate }}
      community.crypto.acme_certificate:
        csr_content: "{{ item.item.csr }}"
        fullchain_dest: "{{ cert_directory }}/{{ certificate }}.{{ item.item.item }}.crt"
        data: "{{ item }}"
      register: result
      loop: "{{ acme_data.results }}"
      # The order might not be ready immediately, retry with a short delay
      retries: 3
      delay: 10

    - name: Store new certificates for {{ certificate }}
      flowerysong.hvault.kv:
        token: "{{ ansible_hvault_token }}"
        key: certificate/{{ certificate }}
        value: "{{ cert_existing | default({}, true) | combine({new_type ~ '_key': new_key, new_type ~ '_cert': new_cert}) }}"
      loop: "{{ result.results }}"
      when: item is changed
      no_log: true
      vars:
        new_type: "{{ item.item.item.item }}"
        new_cert: "{{ lookup('file', cert_directory ~ '/' ~ certificate ~ '.' ~ new_type ~ '.crt') }}"
        new_key: "{{ (key_result.results | selectattr('item.type', '==', new_type)).0.privatekey }}"
